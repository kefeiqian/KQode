# Publishes the kqode npm packages (root `kqode` selector + `@kqode/cli-*`
# platform packages) from a GitHub Release's archives. Registry publishing is a
# deliberately gated step kept OUT of release.yml (per U13): run it by hand for a
# tag, or automatically when a Release is published.
#
# One-time setup: create the `@kqode` npm org/scope, own the `kqode` name,
# generate an npm Automation access token, and add it as the repo secret
# NPM_TOKEN. See docs/release/kqode_distribution_registration.md.
#
# Note: a Release created by release.yml's GITHUB_TOKEN does not re-trigger the
# `release: published` event, so the reliable path is the manual dispatch below.
name: Publish npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.1.0"
        required: true
        type: string
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ inputs.tag || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-22.04
    permissions:
      contents: read # download the release assets
      id-token: write # npm provenance on public repos
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Resolve tag and version
        id: rel
        shell: bash
        env:
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          [ -n "$TAG" ] || { echo "::error::no release tag provided"; exit 1; }
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download release archives
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: >
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir release-assets
          --pattern 'kqode-*.tar.gz' --pattern 'kqode-*.zip'

      - name: Assemble npm packages
        env:
          VERSION: ${{ steps.rel.outputs.version }}
        run: >
          bun tui/scripts/stageNpmFromRelease.ts
          --from=release-assets --out=packaging/npm/dist
          --version="$VERSION"

      - name: Publish to npm (platform packages first, root last)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.rel.outputs.version }}
          REPO_PRIVATE: ${{ github.event.repository.private }}
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${NODE_AUTH_TOKEN:-}" ] || { echo "::error::NPM_TOKEN secret is not set"; exit 1; }

          prov=""
          if [ "$REPO_PRIVATE" = "false" ]; then prov="--provenance"; fi

          publish() {
            local dir="$1" name
            name="$(node -p "require('./$dir/package.json').name")"
            if npm view "$name@$VERSION" version >/dev/null 2>&1; then
              echo "$name@$VERSION already published; skipping."
            else
              ( cd "$dir" && npm publish --access public $prov )
            fi
          }

          # Platform packages first so the root's optionalDependencies resolve.
          for dir in packaging/npm/dist/@kqode/*; do
            if [ -d "$dir" ]; then publish "$dir"; fi
          done
          publish packaging/npm/dist/kqode
